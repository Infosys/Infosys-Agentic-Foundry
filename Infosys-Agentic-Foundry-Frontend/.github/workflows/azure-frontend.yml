# ============================================================
#  TEMPLATE: Build and Deploy Frontend to AKS (Azure Kubernetes Service)
#
#  HOW TO USE THIS TEMPLATE:
#  1. Search for every occurrence of <PLACEHOLDER> below and
#     replace it with your actual value.
#  2. Add the required GitHub Secrets listed in the SECRETS
#     section to your repository before running this pipeline.
#  3. Ensure your self-hosted runner has the correct label and
#     all required tools installed (az CLI, docker, kubectl,
#     kubelogin).
#  4. Rename this file to deploy-aks-frontend.yml and place it
#     in .github/workflows/ in your repository.
#
#  FRONTEND NOTES:
#  - This pipeline does NOT deploy infrastructure services
#    (Elasticsearch, OTel, Phoenix, Grafana, Redis). Those are
#    only needed by the backend. Frontend only needs its own
#    environment variables (e.g. API base URL, feature flags).
#  - The frontend container serves on port 80 (nginx default).
#  - The env file secret (FRONTEND_ENV_FILE) should contain
#    KEY=VALUE pairs for your frontend runtime config.
#  - AGENT_PATH is the path on the runner where the frontend
#    source code resides (set as an env var on the runner VM
#    or replace with the actual directory path).
# ============================================================

name: Build and Deploy Frontend to AKS

# ── Triggers ─────────────────────────────────────────────────
# Auto-trigger on push to your branch, or run manually.
on:
  push:
    branches:
      - '<YOUR_BRANCH_NAME>'        # ← Change to your deployment branch (e.g. main, develop)
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Manual version input (informational only)'
        required: false
        default: 'latest'

# ── Pipeline-level environment variables ─────────────────────
# Non-sensitive values are read from GitHub Variables (vars.*)
# Sensitive values are read from GitHub Secrets (secrets.*)
# Nothing is hardcoded here — safe to commit to public GitHub.
env:
  # ── Non-sensitive config → stored as GitHub Variables ────────
  # GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}  # e.g. myregistry.azurecr.io
  RESOURCE_GROUP:            ${{ vars.RESOURCE_GROUP }}            # e.g. my-rg-prod
  CLUSTER_NAME:              ${{ vars.CLUSTER_NAME }}              # e.g. aks-my-cluster
  NAMESPACE:                 ${{ vars.NAMESPACE }}                 # K8s namespace for the frontend app
  DEPLOY_NAME:               ${{ vars.DEPLOY_NAME }}               # K8s Deployment name
  CONTAINER_NAME:            ${{ vars.CONTAINER_NAME }}            # Container name inside the pod
  SHORT_NAME:                ${{ vars.SHORT_NAME }}                # Short name for ACR image tagging

# ── GITHUB VARIABLES (non-sensitive) ─────────────────────────
# GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
#
#   Variable Name              Example Value
#   ─────────────────────────────────────────────────────────
#   AZURE_CONTAINER_REGISTRY   myregistry.azurecr.io
#   RESOURCE_GROUP             my-resource-group
#   CLUSTER_NAME               aks-my-cluster
#   NAMESPACE                  my-frontend-namespace
#   DEPLOY_NAME                my-frontend-deployment
#   CONTAINER_NAME             my-frontend-container
#   SHORT_NAME                 my-frontend
#
# ── GITHUB SECRETS (sensitive) ───────────────────────────────
# GitHub Repo → Settings → Secrets and variables → Actions → New repository secret
#
#   Secret Name               What to Put
#   ─────────────────────────────────────────────────────────
#   AZURE_CLIENT_ID           Service Principal Application (Client) ID
#   AZURE_CLIENT_SECRET       Service Principal Client Secret
#   AZURE_TENANT_ID           Azure Active Directory Tenant ID
#   AZURE_SUBSCRIPTION_ID     Azure Subscription ID
#   FRONTEND_ENV_FILE         Full content of your frontend .env file
#                             (KEY=VALUE pairs, e.g. REACT_APP_API_URL=http://...)
# ─────────────────────────────────────────────────────────────

jobs:

  # ============================================================
  # JOB 1 — buildImage
  # Builds the frontend Docker image and pushes it to Azure
  # Container Registry (ACR), tagged with the Git commit SHA
  # for full traceability.
  #
  # The build uses $AGENT_PATH (an env var set on the runner VM
  # pointing to the frontend source directory). Replace with
  # an explicit path if AGENT_PATH is not configured on your runner.
  # ============================================================
  buildImage:
    name: Build and Push Docker Image
    runs-on: [self-hosted, Linux, X64, '<YOUR_RUNNER_LABEL>']  # ← Change to your runner label
    permissions:
      contents: read
      id-token: write

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Azure Login ───────────────────────────────────────
      # Authenticates using a Service Principal stored in GitHub Secrets.
      # SSL env vars are required in corporate networks with custom CA bundles.
      - name: Azure login
        shell: bash
        env:
          REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-bundle.crt
          SSL_CERT_FILE:      /etc/ssl/certs/ca-bundle.crt
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant   "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # ── 3. Build and Push Docker Image ───────────────────────
      # Logs in to ACR, builds the frontend image from $AGENT_PATH,
      # and pushes it tagged with the git commit SHA.
      # HTTP/HTTPS proxy is unset before ACR login so the ACR
      # endpoint is reached directly (not via corporate proxy).
      - name: Build and Push Docker Image to ACR
        env:
          HTTP_PROXY:  ${{ vars.HTTP_PROXY }}          # ← Set as a GitHub Variable or remove if not needed
          HTTPS_PROXY: ${{ vars.HTTPS_PROXY }}         # ← Set as a GitHub Variable or remove if not needed
          NO_PROXY:    ${{ vars.NO_PROXY }}             # ← Set as a GitHub Variable or remove if not needed
        run: |
          ACR_NAME=$(echo "${{ env.AZURE_CONTAINER_REGISTRY }}" | cut -d'.' -f1)
          ACR_IMG="${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"

          echo "INFO: Logging in to ACR: $ACR_NAME ..."
          unset HTTP_PROXY
          unset HTTPS_PROXY
          az acr login --name "$ACR_NAME"

          echo "INFO: Building frontend image => $ACR_IMG ..."
          cd "$AGENT_PATH"         # ← AGENT_PATH must be set on the runner VM pointing to frontend source
          docker build --shm-size=8g -t "$ACR_IMG" .

          echo "INFO: Pushing image => $ACR_IMG ..."
          docker push "$ACR_IMG"
          echo "INFO: Frontend image pushed to ACR successfully."


  # ============================================================
  # JOB 2 — deploy
  # Deploys the frontend application to AKS.
  # - Creates the app namespace if it does not exist.
  # - Builds a Kubernetes Secret from the frontend .env file
  #   (no infra IPs injected — frontend does not use them).
  # - On first run: creates the Deployment + LoadBalancer Service
  #   with containerPort 80.
  # - On subsequent runs: updates the container image only.
  # - Waits for rollout, then prints a full deployment summary.
  # - On failure: auto-prints pod logs and events for debugging.
  # ============================================================
  deploy:
    name: Deploy Frontend to AKS
    needs: buildImage
    runs-on: [self-hosted, Linux, X64, '<YOUR_RUNNER_LABEL>']  # ← Change to your runner label
    permissions:
      actions:  read
      contents: read

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Azure Login ───────────────────────────────────────
      - name: Azure login
        shell: bash
        env:
          REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-bundle.crt
          SSL_CERT_FILE:      /etc/ssl/certs/ca-bundle.crt
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant   "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # ── 3. kubelogin ─────────────────────────────────────────
      # Required for AKS clusters with Azure AD / OIDC auth.
      - name: Set up kubelogin
        env:
          NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-bundle.crt
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.0.25'         # Pin a version for reproducibility

      # ── 4. AKS Context ───────────────────────────────────────
      # Configures kubectl to talk to your AKS cluster.
      - name: Get Kubernetes context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name:   ${{ env.CLUSTER_NAME }}
          admin:          'false'
          use-kubelogin:  'true'

      # ── 5. App Namespace ──────────────────────────────────────
      - name: Ensure Namespace Exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      # ── 6. Kubernetes Secret ──────────────────────────────────
      # Reads FRONTEND_ENV_FILE secret, deduplicates and sanitizes it
      # (removes duplicate keys, strips quotes/whitespace/comments),
      # then creates/updates the Kubernetes Secret 'frontend-env'.
      # No infra service IPs are injected — frontend does not need them.
      - name: Create / Update Kubernetes Secret
        env:
          ENV_FILE_CONTENT: ${{ secrets.FRONTEND_ENV_FILE }}
        run: |
          echo "=== Processing frontend environment file ==="
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "ERROR: FRONTEND_ENV_FILE secret is empty. Please add it in GitHub Secrets."
            exit 1
          fi

          printf "%s" "$ENV_FILE_CONTENT" > .env.temp
          if ! grep -qE '^[A-Za-z_][A-Za-z0-9_]*=.*$' .env.temp; then
            echo "ERROR: FRONTEND_ENV_FILE does not contain valid KEY=VALUE pairs."
            exit 1
          fi

          awk -F= '!seen[$1]++' .env.temp > .env.cleaned
          sed 's/^[[:space:]]*//; s/[[:space:]]*=[[:space:]]*/=/; s/="\(.*\)"$/=\1/; s/='\''\(.*\)'\''$/=\1/; /^$/d; /^#/d' \
            .env.cleaned > .env.k8s

          echo "=== Final secret keys ==="
          cut -d= -f1 .env.k8s

          kubectl create secret generic frontend-env \
            --from-env-file=.env.k8s \
            -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

          rm -f .env.temp .env.cleaned .env.k8s

      # ── 7. Deploy ─────────────────────────────────────────────
      # First run  → creates the Deployment and LoadBalancer Service.
      # Subsequent → updates the container image only (no downtime).
      # Frontend serves on port 80 (nginx).
      - name: Check if Deployment Exists and Deploy
        run: |
          VAR_IMAGE="${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"

          if kubectl get deployment ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} > /dev/null 2>&1; then
            echo "=== Deployment already exists. Updating image only ==="
            kubectl set image deployment/${{ env.DEPLOY_NAME }} \
              ${{ env.CONTAINER_NAME }}="$VAR_IMAGE" \
              -n ${{ env.NAMESPACE }}
          else
            echo "=== First-time deployment. Creating Deployment and Service ==="
            cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ env.DEPLOY_NAME }}
            template:
              metadata:
                labels:
                  app: ${{ env.DEPLOY_NAME }}
              spec:
                containers:
                  - name: ${{ env.CONTAINER_NAME }}
                    image: ${VAR_IMAGE}
                    ports:
                      - containerPort: 80
                    envFrom:
                      - secretRef:
                          name: frontend-env    # Populated from FRONTEND_ENV_FILE secret
                    resources:
                      requests:
                        memory: "256Mi"
                        cpu: "125m"
                      limits:
                        memory: "512Mi"
                        cpu: "500m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
            annotations:
              # Restricts the LB to internal traffic only.
              # Remove this annotation for public internet access.
              service.beta.kubernetes.io/azure-load-balancer-internal: "true"
          spec:
            selector:
              app: ${{ env.DEPLOY_NAME }}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
            type: LoadBalancer
          EOF
          fi

      # ── 8. Wait and Check Deployment ─────────────────────────
      # Waits up to 5 minutes for the rollout to succeed,
      # then prints deployment / pod / service status and recent logs.
      - name: Wait and Check Deployment
        run: |
          echo "INFO: Waiting for frontend deployment rollout ..."
          kubectl rollout status deployment/${{ env.DEPLOY_NAME }} \
            -n ${{ env.NAMESPACE }} --timeout=5m

          echo "=== Deployment Status ==="
          kubectl get deployment -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Service Status ==="
          kubectl get svc -n ${{ env.NAMESPACE }} ${{ env.DEPLOY_NAME }}

          POD_NAME=$(kubectl get pods -n ${{ env.NAMESPACE }} \
                      -l app=${{ env.DEPLOY_NAME }} \
                      -o jsonpath="{.items[0].metadata.name}")
          if [ -n "$POD_NAME" ]; then
            echo "=== Pod Logs (last 100 lines) ==="
            kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --tail=100 || echo "No logs available yet."
          fi

      # ── 9. Get App Endpoint ───────────────────────────────────
      # Polls until the frontend LoadBalancer IP is assigned.
      - name: Get Service Endpoint
        id: app_ip
        run: |
          echo "=== Waiting for Frontend LoadBalancer IP ==="
          APP_IP=""
          for i in $(seq 1 36); do
            APP_IP=$(kubectl get svc ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} \
                      -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$APP_IP" ]; then
              break
            fi
            echo "  Attempt $i/36 — retrying in 10s..."
            sleep 10
          done
          echo "APP_SERVICE_IP=$APP_IP" >> "$GITHUB_OUTPUT"
          echo "Frontend endpoint: http://${APP_IP}:80"

      # ── 10. Final Summary ─────────────────────────────────────
      - name: Final Deployment Summary
        run: |
          echo "======================================================"
          echo "          FRONTEND DEPLOYMENT SUMMARY"
          echo "======================================================"
          echo "  [Frontend Application]"
          echo "  Deployment : ${{ env.DEPLOY_NAME }}"
          echo "  Namespace  : ${{ env.NAMESPACE }}"
          echo "  Image      : ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          echo "  Endpoint   : http://${{ steps.app_ip.outputs.APP_SERVICE_IP }}:80"
          echo "======================================================"

      # ── 11. Debug on Failure ──────────────────────────────────
      # Only runs when a previous step fails.
      # Prints pod descriptions, events, current logs, and
      # previous container logs to help diagnose the issue.
      - name: Debug Deployment Failure
        if: failure()
        run: |
          echo "=== DEBUGGING FRONTEND DEPLOYMENT FAILURE ==="

          echo "=== All Pods in Namespace ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          echo "=== Recent Events ==="
          kubectl get events -n ${{ env.NAMESPACE }} \
            --sort-by='.lastTimestamp' | tail -n 30

          POD_NAME=$(kubectl get pods -n ${{ env.NAMESPACE }} \
                      -l app=${{ env.DEPLOY_NAME }} \
                      -o jsonpath="{.items[0].metadata.name}")

          if [ -n "$POD_NAME" ]; then
            echo "=== Pod Description ==="
            kubectl describe pod "$POD_NAME" -n ${{ env.NAMESPACE }}

            echo "=== Current Container Logs ==="
            kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --tail=100 \
              || echo "No current logs available."

            echo "=== Previous Container Logs (if pod restarted) ==="
            kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --previous --tail=100 \
              || echo "No previous logs available."
          else
            echo "No pod found with label app=${{ env.DEPLOY_NAME }}"
          fi