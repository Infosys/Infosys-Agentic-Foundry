# ============================================================
#  TEMPLATE: Build and Deploy Frontend to EKS (Amazon Elastic Kubernetes Service)
#
#  HOW TO USE THIS TEMPLATE:
#  1. Search for every occurrence of <PLACEHOLDER> below and
#     replace it with your actual value.
#  2. Add the required GitHub Secrets listed in the SECRETS
#     section to your repository before running this pipeline.
#  3. Ensure your self-hosted runner has the correct label and
#     all required tools installed (aws CLI, docker, kubectl).
#  4. Rename this file to deploy-eks-frontend.yml and place it
#     in .github/workflows/ in your repository.
#
#  FRONTEND NOTES:
#  - This pipeline does NOT deploy infrastructure services
#    (Elasticsearch, OTel, Phoenix, Grafana, Redis). Those are
#    only needed by the backend. Frontend only needs its own
#    environment variables (e.g. API base URL, feature flags).
#  - The frontend container serves on port 80 (nginx default).
#  - The env file secret (FRONTEND_ENV_FILE) should contain
#    KEY=VALUE pairs for your frontend runtime config.
#  - AGENT_PATH is the path on the runner where the frontend
#    source code resides (set as an env var on the runner VM
#    or replace with the actual directory path).
# ============================================================

name: Build and Deploy Frontend to EKS

# ── Triggers ─────────────────────────────────────────────────
# Auto-trigger on push to your branch, or run manually.
on:
  push:
    branches:
      - '<YOUR_BRANCH_NAME>'        # ← Change to your deployment branch (e.g. main, develop)
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Manual version input (informational only)'
        required: false
        default: 'latest'

# ── Pipeline-level environment variables ─────────────────────
# Non-sensitive values are read from GitHub Variables (vars.*)
# Sensitive values are read from GitHub Secrets (secrets.*)
# Nothing is hardcoded here — safe to commit to public GitHub.
env:
  # ── Non-sensitive config → stored as GitHub Variables ────────
  # GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
  ECR_REGISTRY:     ${{ vars.ECR_REGISTRY }}      # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:   ${{ vars.ECR_REPOSITORY }}    # e.g. my-frontend-repo
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}  # e.g. eks-my-cluster
  NAMESPACE:        ${{ vars.NAMESPACE }}          # K8s namespace for the frontend app
  DEPLOY_NAME:      ${{ vars.DEPLOY_NAME }}        # K8s Deployment name
  CONTAINER_NAME:   ${{ vars.CONTAINER_NAME }}     # Container name inside the pod
  SHORT_NAME:       ${{ vars.SHORT_NAME }}         # Short name for ECR image tagging

# ── GITHUB VARIABLES (non-sensitive) ─────────────────────────
# GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
#
#   Variable Name       Example Value
#   ──────────────────────────────────────────────────────────
#   ECR_REGISTRY        123456789012.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPOSITORY      my-frontend-repo
#   EKS_CLUSTER_NAME    eks-my-cluster
#   NAMESPACE           my-frontend-namespace
#   DEPLOY_NAME         my-frontend-deployment
#   CONTAINER_NAME      my-frontend-container
#   SHORT_NAME          my-frontend
#
# ── GITHUB SECRETS (sensitive) ───────────────────────────────
# GitHub Repo → Settings → Secrets and variables → Actions → New repository secret
#
#   Secret Name           What to Put
#   ──────────────────────────────────────────────────────────
#   AWS_ACCESS_KEY_ID     IAM user Access Key ID
#   AWS_SECRET_ACCESS_KEY IAM user Secret Access Key
#   AWS_SESSION_TOKEN     Session token (if using temporary/assumed-role credentials)
#   AWS_REGION            AWS region where ECR and EKS are hosted (e.g. us-east-1)
#   FRONTEND_ENV_FILE     Full content of your frontend .env file
#                         (KEY=VALUE pairs, e.g. REACT_APP_API_URL=http://...)
# ─────────────────────────────────────────────────────────────

jobs:

  # ============================================================
  # JOB 1 — buildImage
  # Builds the frontend Docker image and pushes it to Amazon
  # ECR, tagged with the Git commit SHA for full traceability.
  # ============================================================
  buildImage:
    name: Build and Push Docker Image
    runs-on: [self-hosted, Linux, X64, '<YOUR_RUNNER_LABEL>']  # ← Change to your runner label
    permissions:
      contents: read
      id-token: write

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS Credentials ───────────────────────────────────
      # Authenticates using IAM credentials stored in GitHub Secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Build and Push Docker Image ───────────────────────
      # Logs in to ECR, builds the frontend image from $AGENT_PATH,
      # and pushes it tagged with the git commit SHA.
      - name: Build and Push Docker Image to ECR
        run: |
          ECR_IMG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"

          echo "INFO: Logging in to ECR ..."
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            sudo docker login --username AWS --password-stdin "${{ env.ECR_REGISTRY }}"

          echo "INFO: Building frontend image => $ECR_IMG ..."
          cd "$AGENT_PATH"         # ← AGENT_PATH must be set on the runner VM pointing to frontend source
          sudo docker build --shm-size=8g -t "$ECR_IMG" .

          echo "INFO: Pushing image => $ECR_IMG ..."
          sudo docker push "$ECR_IMG"
          echo "INFO: Frontend image pushed to ECR successfully."


  # ============================================================
  # JOB 2 — deploy
  # Deploys the frontend application to EKS.
  # - Creates the app namespace if it does not exist.
  # - Builds a Kubernetes Secret from the frontend .env file
  #   (no infra IPs injected — frontend does not use them).
  # - On first run: creates the Deployment + LoadBalancer Service
  #   with containerPort 80 (AWS internal LB via NLB annotation).
  # - On subsequent runs: updates the container image only.
  # - Waits for rollout, then prints a full deployment summary.
  # - On failure: auto-prints pod logs and events for debugging.
  # ============================================================
  deploy:
    name: Deploy Frontend to EKS
    needs: buildImage
    runs-on: [self-hosted, Linux, X64, '<YOUR_RUNNER_LABEL>']  # ← Change to your runner label
    permissions:
      actions:  read
      contents: read

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. AWS Credentials ───────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. EKS Context ───────────────────────────────────────
      # Configures kubectl to talk to your EKS cluster.
      - name: Update kubeconfig for EKS
        run: |
          echo "INFO: Updating kubeconfig for cluster ${{ env.EKS_CLUSTER_NAME }} ..."
          sudo aws eks update-kubeconfig \
            --name   ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      # ── 4. Debug Cluster Connectivity ────────────────────────
      - name: Verify Cluster Connectivity
        run: |
          echo "=== kubectl current context ==="
          sudo kubectl config current-context
          echo "=== Cluster nodes ==="
          sudo kubectl get nodes

      # ── 5. App Namespace ──────────────────────────────────────
      - name: Ensure Namespace Exists
        run: |
          sudo kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | sudo kubectl apply -f -

      # ── 6. Kubernetes Secret ──────────────────────────────────
      # Reads FRONTEND_ENV_FILE secret, deduplicates and sanitizes it
      # (removes duplicate keys, strips quotes/whitespace/comments),
      # then creates/updates the Kubernetes Secret 'frontend-env'.
      # No infra service IPs are injected — frontend does not need them.
      - name: Create / Update Kubernetes Secret
        env:
          ENV_FILE_CONTENT: ${{ secrets.FRONTEND_ENV_FILE }}
        run: |
          echo "=== Processing frontend environment file ==="
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "ERROR: FRONTEND_ENV_FILE secret is empty. Please add it in GitHub Secrets."
            exit 1
          fi

          printf "%s" "$ENV_FILE_CONTENT" > .env.temp
          if ! grep -qE '^[A-Za-z_][A-Za-z0-9_]*=.*$' .env.temp; then
            echo "ERROR: FRONTEND_ENV_FILE does not contain valid KEY=VALUE pairs."
            exit 1
          fi

          awk -F= '!seen[$1]++' .env.temp > .env.cleaned
          sed 's/^[[:space:]]*//; s/[[:space:]]*=[[:space:]]*/=/; s/="\(.*\)"$/=\1/; s/='\''\(.*\)'\''$/=\1/; /^$/d; /^#/d' \
            .env.cleaned > .env.k8s

          echo "=== Final secret keys ==="
          cut -d= -f1 .env.k8s

          sudo kubectl create secret generic frontend-env \
            --from-env-file=.env.k8s \
            -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | sudo kubectl apply -f -

          rm -f .env.temp .env.cleaned .env.k8s

      # ── 7. Deploy ─────────────────────────────────────────────
      # First run  → creates the Deployment and LoadBalancer Service.
      # Subsequent → updates the container image only (no downtime).
      # Frontend serves on port 80 (nginx).
      - name: Check if Deployment Exists and Deploy
        run: |
          ECR_IMG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          export IMAGE_NAME="$ECR_IMG"

          if sudo kubectl get deployment ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} > /dev/null 2>&1; then
            echo "=== Deployment already exists. Updating image only ==="
            sudo kubectl set image deployment/${{ env.DEPLOY_NAME }} \
              ${{ env.CONTAINER_NAME }}="$ECR_IMG" \
              -n ${{ env.NAMESPACE }}
          else
            echo "=== First-time deployment. Creating Deployment and Service ==="
            envsubst <<'EOF' | sudo kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ env.DEPLOY_NAME }}
            template:
              metadata:
                labels:
                  app: ${{ env.DEPLOY_NAME }}
              spec:
                containers:
                  - name: ${{ env.CONTAINER_NAME }}
                    image: ${IMAGE_NAME}
                    ports:
                      - containerPort: 80
                    envFrom:
                      - secretRef:
                          name: frontend-env    # Populated from FRONTEND_ENV_FILE secret
                    resources:
                      requests:
                        memory: "256Mi"
                        cpu: "125m"
                      limits:
                        memory: "512Mi"
                        cpu: "500m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
            annotations:
              # Restricts the LB to internal VPC traffic only (AWS NLB).
              # Remove these annotations for public internet access.
              service.beta.kubernetes.io/aws-load-balancer-internal: "true"
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          spec:
            selector:
              app: ${{ env.DEPLOY_NAME }}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
            type: LoadBalancer
          EOF
          fi

      # ── 8. Wait and Check Deployment ─────────────────────────
      # Waits up to 5 minutes for the rollout to succeed.
      - name: Wait and Check Deployment
        run: |
          echo "INFO: Waiting for frontend deployment rollout ..."
          sudo kubectl rollout status deployment/${{ env.DEPLOY_NAME }} \
            -n ${{ env.NAMESPACE }} --timeout=5m

          echo "=== Deployment Status ==="
          sudo kubectl get deployment -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Pod Status ==="
          sudo kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Service Status ==="
          sudo kubectl get svc -n ${{ env.NAMESPACE }} ${{ env.DEPLOY_NAME }}

          POD_NAME=$(sudo kubectl get pods -n ${{ env.NAMESPACE }} \
                      -l app=${{ env.DEPLOY_NAME }} \
                      -o jsonpath="{.items[0].metadata.name}")
          if [ -n "$POD_NAME" ]; then
            echo "=== Pod Logs (last 100 lines) ==="
            sudo kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --tail=100 || echo "No logs available yet."
          fi

      # ── 9. Get App Endpoint ───────────────────────────────────
      # AWS EKS internal NLBs expose a DNS hostname, not an IP.
      # This step polls for the hostname and attempts nslookup.
      - name: Get Service Endpoint
        id: app_ep
        run: |
          echo "=== Waiting for Frontend LoadBalancer Hostname ==="
          APP_HOST=""
          for i in $(seq 1 36); do
            APP_HOST=$(sudo kubectl get svc ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} \
                        -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -z "$APP_HOST" ]; then
              APP_HOST=$(sudo kubectl get svc ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} \
                          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            fi
            if [ -n "$APP_HOST" ]; then
              break
            fi
            echo "  Attempt $i/36 — retrying in 10s..."
            sleep 10
          done
          echo "APP_ENDPOINT=$APP_HOST" >> "$GITHUB_OUTPUT"
          echo "Frontend endpoint: http://${APP_HOST}:80"

      # ── 10. Final Summary ─────────────────────────────────────
      - name: Final Deployment Summary
        run: |
          echo "======================================================"
          echo "          FRONTEND DEPLOYMENT SUMMARY"
          echo "======================================================"
          echo "  [Frontend Application]"
          echo "  Deployment : ${{ env.DEPLOY_NAME }}"
          echo "  Namespace  : ${{ env.NAMESPACE }}"
          echo "  Image      : ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          echo "  Endpoint   : http://${{ steps.app_ep.outputs.APP_ENDPOINT }}:80"
          echo "======================================================"

      # ── 11. Debug on Failure ──────────────────────────────────
      - name: Debug Deployment Failure
        if: failure()
        run: |
          echo "=== DEBUGGING FRONTEND DEPLOYMENT FAILURE ==="

          echo "=== All Pods in Namespace ==="
          sudo kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          echo "=== Recent Events ==="
          sudo kubectl get events -n ${{ env.NAMESPACE }} \
            --sort-by='.lastTimestamp' | tail -n 30

          POD_NAME=$(sudo kubectl get pods -n ${{ env.NAMESPACE }} \
                      -l app=${{ env.DEPLOY_NAME }} \
                      -o jsonpath="{.items[0].metadata.name}")

          if [ -n "$POD_NAME" ]; then
            echo "=== Pod Description ==="
            sudo kubectl describe pod "$POD_NAME" -n ${{ env.NAMESPACE }}

            echo "=== Current Container Logs ==="
            sudo kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --tail=100 \
              || echo "No current logs available."

            echo "=== Previous Container Logs (if pod restarted) ==="
            sudo kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --previous --tail=100 \
              || echo "No previous logs available."
          else
            echo "No pod found with label app=${{ env.DEPLOY_NAME }}"
          fi