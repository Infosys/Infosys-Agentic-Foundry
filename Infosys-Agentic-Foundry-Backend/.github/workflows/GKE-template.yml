# ============================================================
#  TEMPLATE: Build and Deploy to GKE (Google Kubernetes Engine)
#
#  HOW TO USE THIS TEMPLATE:
#  1. Search for every occurrence of <PLACEHOLDER> below and
#     replace it with your actual value.
#  2. Add the required GitHub Secrets listed in the SECRETS
#     section to your repository before running this pipeline.
#  3. Ensure your self-hosted runner has the correct label and
#     all required tools installed (gcloud CLI, docker, kubectl,
#     envsubst, gke-gcloud-auth-plugin).
#  4. Rename this file to deploy-gke.yml and place it in
#     .github/workflows/ in your repository.
# ============================================================

name: Build and Deploy to GKE

# ── Triggers ─────────────────────────────────────────────────
# Auto-trigger on push to your branch, or run manually.
on:
  push:
    branches:
      - '<YOUR_BRANCH_NAME>'          # ← Change to your deployment branch (e.g. main, develop)
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Manual version input (informational only)'
        required: false
        default: 'latest'

# ── Pipeline-level environment variables ─────────────────────
# Non-sensitive values are read from GitHub Variables (vars.*)
# Sensitive values are read from GitHub Secrets (secrets.*)
# Nothing is hardcoded here — safe to commit to public GitHub.
env:
  # ── Non-sensitive config → stored as GitHub Variables ────────
  # GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
  GCP_PROJECT_ID:    ${{ vars.GCP_PROJECT_ID }}    # e.g. my-project-123456
  GKE_CLUSTER_NAME:  ${{ vars.GKE_CLUSTER_NAME }}  # e.g. gke-my-cluster
  GKE_ZONE:          ${{ vars.GKE_ZONE }}           # e.g. us-central1-a or us-central1
  ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}  # e.g. us-central1-docker.pkg.dev/my-project/my-repo
  NAMESPACE:         ${{ vars.NAMESPACE }}           # K8s namespace for the app
  DEPLOY_NAME:       ${{ vars.DEPLOY_NAME }}         # K8s Deployment name
  CONTAINER_NAME:    ${{ vars.CONTAINER_NAME }}      # Container name inside the pod
  SHORT_NAME:        ${{ vars.SHORT_NAME }}          # Short name for Artifact Registry image tagging

  # ── Fixed infra values — no change needed ────────────────────
  INFRA_NAMESPACE_1: 'kafkatest'     # Namespace for ES, OTel, Phoenix, Grafana
  INFRA_NAMESPACE_2: 'iafv4'        # Namespace for Redis
  INFRA_PATH: 'k8s/infra/gcp'       # GCP-specific LB annotations pre-configured

# ── GITHUB VARIABLES (non-sensitive) ─────────────────────────
# GitHub Repo → Settings → Secrets and variables → Variables → New repository variable
#
#   Variable Name       Example Value
#   ──────────────────────────────────────────────────────────
#   GCP_PROJECT_ID      my-project-123456
#   GKE_CLUSTER_NAME    gke-my-cluster
#   GKE_ZONE            us-central1-a
#   ARTIFACT_REGISTRY   us-central1-docker.pkg.dev/my-project/my-repo
#   NAMESPACE           my-app-namespace
#   DEPLOY_NAME         my-deployment
#   CONTAINER_NAME      my-container
#   SHORT_NAME          my-app
#
# ── GITHUB SECRETS (sensitive) ───────────────────────────────
# GitHub Repo → Settings → Secrets and variables → Actions → New repository secret
#
#   Secret Name       What to Put
#   ──────────────────────────────────────────────────────────
#   APP_ENV_FILE_GCP  Full content of your application .env file
#   GCP_SA_KEY        Base64-encoded GCP Service Account JSON key
#                     (only needed if runner is NOT pre-authenticated)
#
# NOTE: This pipeline uses a pre-authenticated self-hosted runner
# (gcloud is already authenticated on the runner VM). If your runner
# is NOT pre-authenticated, add a GCP_SA_KEY secret (base64-encoded
# service account JSON) and add an authentication step using:
#   uses: google-github-actions/auth@v2
# See Section 6 of multi-cloud-deployment-readme.md for details.
# ─────────────────────────────────────────────────────────────

jobs:

  # ============================================================
  # JOB 1 — deployInfra
  # Deploys shared infrastructure services to the GKE cluster.
  # Skips any service that already exists (idempotent).
  # Outputs the LoadBalancer IPs of each infra service so the
  # deploy job can inject them into the application secret.
  # ============================================================
  deployInfra:
    name: Deploy Infrastructure Services
    runs-on: [self-hosted, '<YOUR_RUNNER_LABEL>']       # ← Change to your runner label
    permissions:
      contents: read
    outputs:
      ELASTICSEARCH_IP:  ${{ steps.collect_ips.outputs.ELASTICSEARCH_IP }}
      OTEL_COLLECTOR_IP: ${{ steps.collect_ips.outputs.OTEL_COLLECTOR_IP }}
      PHOENIX_IP:        ${{ steps.collect_ips.outputs.PHOENIX_IP }}
      GRAFANA_IP:        ${{ steps.collect_ips.outputs.GRAFANA_IP }}
      REDIS_IP:          ${{ steps.collect_ips.outputs.REDIS_IP }}

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Fix kubectl Permissions ───────────────────────────
      # Required on some GCP self-hosted runners where kubectl
      # is installed without execute permission for the runner user.
      - name: Fix kubectl Permissions
        run: |
          sudo chmod +x /usr/local/bin/kubectl
          sudo chmod 755 /usr/local/bin/kubectl

      # ── 3. GKE Context ───────────────────────────────────────
      # Configures kubectl to talk to your GKE cluster.
      # Uses gcloud CLI which is pre-authenticated on the runner.
      - name: Authenticate with GKE and get cluster credentials
        run: |
          echo "INFO: Fetching credentials for cluster ${{ env.GKE_CLUSTER_NAME }} ..."
          sudo gcloud container clusters get-credentials ${{ env.GKE_CLUSTER_NAME }} \
            --zone    ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── 4. Namespaces ─────────────────────────────────────────
      # Creates infra namespaces if they do not already exist.
      - name: Ensure Infrastructure Namespaces Exist
        run: |
          sudo kubectl create namespace ${{ env.INFRA_NAMESPACE_1 }} --dry-run=client -o yaml | sudo kubectl apply -f -
          sudo kubectl create namespace ${{ env.INFRA_NAMESPACE_2 }} --dry-run=client -o yaml | sudo kubectl apply -f -

      # ── 5. Elasticsearch ─────────────────────────────────────
      # Applies the Elasticsearch StatefulSet manifest only on first run.
      - name: Apply Elasticsearch
        run: |
          if sudo kubectl get statefulset elasticsearch -n ${{ env.INFRA_NAMESPACE_1 }} > /dev/null 2>&1; then
            echo "INFO: Elasticsearch already exists — skipping."
          else
            echo "INFO: Deploying Elasticsearch ..."
            sudo kubectl apply -f ${{ env.INFRA_PATH }}/iaf-es.yaml
            echo "INFO: Elasticsearch applied successfully."
          fi

      # ── 6. Wait for Elasticsearch IP ─────────────────────────
      # Polls up to 6 minutes (36 × 10s) for the LoadBalancer IP.
      # The IP is needed to configure the OpenTelemetry Collector.
      - name: Wait for Elasticsearch LoadBalancer IP
        id: wait_es_ip
        run: |
          echo "--- Waiting for Elasticsearch LoadBalancer IP ---"
          IP=""
          for i in $(seq 1 36); do
            IP=$(sudo kubectl get svc elasticsearch -n ${{ env.INFRA_NAMESPACE_1 }} \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$IP" ]; then
              break
            fi
            echo "  Attempt $i/36 — not ready yet, retrying in 10s..."
            sleep 10
          done
          if [ -n "$IP" ]; then
            echo "SUCCESS: Elasticsearch IP => $IP"
            echo "ELASTICSEARCH_IP=$IP" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Could not obtain Elasticsearch IP after 6 minutes."
            exit 1
          fi

      # ── 7. OpenTelemetry Collector ────────────────────────────
      # Injects the Elasticsearch IP into the OTel manifest before applying.
      - name: Apply OpenTelemetry Collector
        run: |
          ES_IP="${{ steps.wait_es_ip.outputs.ELASTICSEARCH_IP }}"
          echo "INFO: Using Elasticsearch endpoint => http://${ES_IP}:9200"
          if sudo kubectl get deployment opentelemetry-collector -n ${{ env.INFRA_NAMESPACE_1 }} > /dev/null 2>&1; then
            echo "INFO: OpenTelemetry Collector already exists — skipping."
          else
            echo "INFO: Deploying OpenTelemetry Collector ..."
            sed "s|ELASTICSEARCH_ENDPOINT|${ES_IP}|g" ${{ env.INFRA_PATH }}/iaf-otel.yaml | sudo kubectl apply -f -
            echo "INFO: OpenTelemetry Collector applied with ES endpoint http://${ES_IP}:9200"
          fi

      # ── 8. Phoenix (Arize) ────────────────────────────────────
      - name: Apply Phoenix (Arize LLM Observability)
        run: |
          if sudo kubectl get deployment phoenix -n ${{ env.INFRA_NAMESPACE_1 }} > /dev/null 2>&1; then
            echo "INFO: Phoenix already exists — skipping."
          else
            echo "INFO: Deploying Phoenix ..."
            sudo kubectl apply -f ${{ env.INFRA_PATH }}/iaf-arpx.yaml
            echo "INFO: Phoenix applied successfully."
          fi

      # ── 9. Grafana ───────────────────────────────────────────
      - name: Apply Grafana
        run: |
          if sudo kubectl get deployment grafana -n ${{ env.INFRA_NAMESPACE_1 }} > /dev/null 2>&1; then
            echo "INFO: Grafana already exists — skipping."
          else
            echo "INFO: Deploying Grafana ..."
            sudo kubectl apply -f ${{ env.INFRA_PATH }}/iaf-grafana.yaml
            echo "INFO: Grafana applied successfully."
          fi

      # ── 10. Redis ─────────────────────────────────────────────
      - name: Apply Redis
        run: |
          if sudo kubectl get deployment redis -n ${{ env.INFRA_NAMESPACE_2 }} > /dev/null 2>&1; then
            echo "INFO: Redis already exists — skipping."
          else
            echo "INFO: Deploying Redis ..."
            sudo kubectl apply -f ${{ env.INFRA_PATH }}/iaf-redis.yaml
            echo "INFO: Redis applied successfully."
          fi

      # ── 11. Collect all IPs ───────────────────────────────────
      # Waits for LoadBalancer IPs of all infra services.
      # Sets UNKNOWN if a service does not get an IP in 6 minutes.
      - name: Wait for All Infrastructure Service IPs
        id: collect_ips
        run: |
          wait_for_ip() {
            local SVC="$1"
            local NS="$2"
            local VAR="$3"
            local IP=""
            echo "--- Waiting for IP: service/$SVC in namespace $NS ---"
            for i in $(seq 1 36); do
              IP=$(sudo kubectl get svc "$SVC" -n "$NS" \
                    -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
              if [ -n "$IP" ]; then
                break
              fi
              echo "  Attempt $i/36 — not ready yet, retrying in 10s..."
              sleep 10
            done
            if [ -n "$IP" ]; then
              echo "SUCCESS: $SVC => $IP"
              echo "$VAR=$IP" >> "$GITHUB_OUTPUT"
            else
              echo "WARNING: Could not get IP for $SVC after 6 min. Setting UNKNOWN."
              echo "$VAR=UNKNOWN" >> "$GITHUB_OUTPUT"
            fi
          }

          wait_for_ip "elasticsearch"           "${{ env.INFRA_NAMESPACE_1 }}" "ELASTICSEARCH_IP"
          wait_for_ip "opentelemetry-collector" "${{ env.INFRA_NAMESPACE_1 }}" "OTEL_COLLECTOR_IP"
          wait_for_ip "phoenix"                 "${{ env.INFRA_NAMESPACE_1 }}" "PHOENIX_IP"
          wait_for_ip "grafana"                 "${{ env.INFRA_NAMESPACE_1 }}" "GRAFANA_IP"
          wait_for_ip "redis"                   "${{ env.INFRA_NAMESPACE_2 }}" "REDIS_IP"

      # ── 12. Print Summary ─────────────────────────────────────
      - name: Print Infrastructure IP Summary
        run: |
          echo "======================================================"
          echo "        INFRASTRUCTURE SERVICE IP SUMMARY"
          echo "======================================================"
          echo "  Elasticsearch           : ${{ steps.collect_ips.outputs.ELASTICSEARCH_IP }}:9200"
          echo "  OpenTelemetry Collector : ${{ steps.collect_ips.outputs.OTEL_COLLECTOR_IP }}:4318/4319/4320"
          echo "  Phoenix (Arize)         : ${{ steps.collect_ips.outputs.PHOENIX_IP }}:6006"
          echo "  Grafana                 : ${{ steps.collect_ips.outputs.GRAFANA_IP }}:3000"
          echo "  Redis                   : ${{ steps.collect_ips.outputs.REDIS_IP }}:6379"
          echo "======================================================"


  # ============================================================
  # JOB 2 — buildImage
  # Builds the Docker image and pushes it to Google Artifact
  # Registry, tagged with the Git commit SHA for traceability.
  # ============================================================
  buildImage:
    name: Build and Push Docker Image
    needs: deployInfra
    runs-on: [self-hosted, '<YOUR_RUNNER_LABEL>']       # ← Change to your runner label
    permissions:
      contents: read
      id-token: write

    steps:

      # ── 1. Print Infra IPs (pre-build info) ──────────────────
      - name: Show Infrastructure IPs (pre-build summary)
        run: |
          echo "======================================================"
          echo "     INFRA SERVICE IPs (available for this build)"
          echo "======================================================"
          echo "  Elasticsearch           : ${{ needs.deployInfra.outputs.ELASTICSEARCH_IP }}:9200"
          echo "  OpenTelemetry Collector : ${{ needs.deployInfra.outputs.OTEL_COLLECTOR_IP }}:4318/4319/4320"
          echo "  Phoenix (Arize)         : ${{ needs.deployInfra.outputs.PHOENIX_IP }}:6006"
          echo "  Grafana                 : ${{ needs.deployInfra.outputs.GRAFANA_IP }}:3000"
          echo "  Redis                   : ${{ needs.deployInfra.outputs.REDIS_IP }}:6379"
          echo "======================================================"
          echo "  These IPs will be injected into the app secret"
          echo "  during the deploy job."
          echo "======================================================"

      # ── 2. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 3. Authenticate Docker with Artifact Registry ────────
      # Configures Docker to use gcloud credentials for pushing
      # to Google Artifact Registry.
      - name: Authenticate Docker with Artifact Registry
        run: |
          REGISTRY_HOST=$(echo "${{ env.ARTIFACT_REGISTRY }}" | cut -d'/' -f1)
          echo "INFO: Configuring Docker auth for $REGISTRY_HOST ..."
          sudo gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      # ── 4. Build Docker Image ────────────────────────────────
      # Tagged with the git commit SHA for traceability.
      - name: Build Docker Image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          echo "INFO: Building image => $IMAGE ..."
          sudo docker build --shm-size=8g -t "$IMAGE" .
          echo "INFO: Build complete."

      # ── 5. Push Docker Image ─────────────────────────────────
      - name: Push Docker Image to Artifact Registry
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          echo "INFO: Pushing image => $IMAGE ..."
          sudo docker push "$IMAGE"
          echo "INFO: Image pushed successfully."


  # ============================================================
  # JOB 3 — deploy
  # Deploys the application to GKE.
  # - Creates the app namespace if it does not exist.
  # - Builds a Kubernetes Secret from the .env file and injects
  #   the live infra service IPs (from deployInfra outputs).
  # - On first run: creates the Deployment + LoadBalancer Service.
  # - On subsequent runs: updates the container image only.
  # - Waits for rollout, then prints a full deployment summary.
  # - On failure: auto-prints pod logs and events for debugging.
  # ============================================================
  deploy:
    name: Deploy to GKE
    needs: [deployInfra, buildImage]
    runs-on: [self-hosted, '<YOUR_RUNNER_LABEL>']       # ← Change to your runner label
    permissions:
      actions:  read
      contents: read

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Fix kubectl Permissions ───────────────────────────
      - name: Fix kubectl Permissions
        run: |
          sudo chmod +x /usr/local/bin/kubectl
          sudo chmod 755 /usr/local/bin/kubectl

      # ── 3. GKE Context ───────────────────────────────────────
      # Refreshes kubeconfig so kubectl points to your GKE cluster.
      - name: Authenticate with GKE and get cluster credentials
        run: |
          echo "INFO: Fetching credentials for cluster ${{ env.GKE_CLUSTER_NAME }} ..."
          sudo gcloud container clusters get-credentials ${{ env.GKE_CLUSTER_NAME }} \
            --zone    ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      # ── 4. Debug Cluster Connectivity ────────────────────────
      # Verifies that kubectl can reach the cluster before deploying.
      - name: Verify Cluster Connectivity
        run: |
          echo "=== kubectl current context ==="
          sudo kubectl config current-context
          echo "=== Cluster info ==="
          sudo kubectl cluster-info
          echo "=== Cluster nodes ==="
          sudo kubectl get nodes

      # ── 5. App Namespace ─────────────────────────────────────
      - name: Ensure App Namespace Exists
        run: |
          sudo kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | sudo kubectl apply -f -

      # ── 6. Kubernetes Secret ──────────────────────────────────
      # Reads APP_ENV_FILE_GCP secret, validates format, cleans it
      # (removes duplicates, strips quotes/whitespace/comments),
      # then appends the live infra service IPs collected by the
      # deployInfra job. The result becomes the K8s Secret 'app-env'.
      - name: Create / Update Kubernetes Secret (with infra IPs injected)
        env:
          ENV_FILE_CONTENT: ${{ secrets.APP_ENV_FILE_GCP }}
          ELASTICSEARCH_IP:  ${{ needs.deployInfra.outputs.ELASTICSEARCH_IP }}
          OTEL_COLLECTOR_IP: ${{ needs.deployInfra.outputs.OTEL_COLLECTOR_IP }}
          PHOENIX_IP:        ${{ needs.deployInfra.outputs.PHOENIX_IP }}
          GRAFANA_IP:        ${{ needs.deployInfra.outputs.GRAFANA_IP }}
          REDIS_IP:          ${{ needs.deployInfra.outputs.REDIS_IP }}
        run: |
          echo "=== Processing environment file ==="
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "ERROR: APP_ENV_FILE_GCP secret is empty. Please add it in GitHub Secrets."
            exit 1
          fi

          # Write env file and validate it has at least one valid KEY=VALUE line
          printf "%s" "$ENV_FILE_CONTENT" > .env.temp
          if ! grep -qE '^[A-Za-z_][A-Za-z0-9_]*=.*$' .env.temp; then
            echo "ERROR: APP_ENV_FILE_GCP does not contain valid KEY=VALUE pairs."
            exit 1
          fi

          # Deduplicate and sanitize the env file
          awk -F= '!seen[$1]++' .env.temp > .env.cleaned
          sed 's/^[[:space:]]*//; s/[[:space:]]*=[[:space:]]*/=/; s/="\(.*\)"$/=\1/; s/='\''\(.*\)'\''$/=\1/; /^$/d; /^#/d' \
            .env.cleaned > .env.k8s

          echo "=== Injecting infra service IPs ==="
          printf '%s\n' \
            "PHOENIX_COLLECTOR_ENDPOINT=http://${PHOENIX_IP}:6006" \
            "PHOENIX_GRPC_PORT=50051" \
            "REDIS_HOST=${REDIS_IP}" \
            "REDIS_PORT=6379" \
            "REDIS_DB=0" \
            "OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://${OTEL_COLLECTOR_IP}:4318/v1/traces" \
            "USE_HTTP=True" \
            "OTEL_EXPORTER_OTLP_LOGS_ENDPOINT_HTTP=http://${OTEL_COLLECTOR_IP}:4320/v1/logs" \
            "OTEL_EXPORTER_OTLP_LOGS_ENDPOINT_GRPC=${OTEL_COLLECTOR_IP}:4319" \
            "ELASTICSEARCH_HOST=${ELASTICSEARCH_IP}" \
            "ELASTICSEARCH_URL=http://${ELASTICSEARCH_IP}:9200" \
            "GRAFANA_URL=http://${GRAFANA_IP}:3000" >> .env.k8s

          # Final deduplication: last value wins for any duplicate key
          tac .env.k8s | awk -F= '!seen[$1]++' | tac > .env.final
          mv .env.final .env.k8s

          echo "=== Final secret keys (after deduplication) ==="
          cut -d= -f1 .env.k8s

          sudo kubectl create secret generic app-env \
            --from-env-file=.env.k8s \
            -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | sudo kubectl apply --validate=false -f -

          rm -f .env.temp .env.cleaned .env.k8s

      # ── 7. Deploy ─────────────────────────────────────────────
      # First run  → creates the Deployment and LoadBalancer Service.
      # Subsequent → updates the container image only (no downtime).
      # Uses envsubst to safely inject the image URL into the YAML.
      - name: Check if Deployment Exists and Deploy
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          export IMAGE_NAME

          if sudo kubectl get deployment ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} > /dev/null 2>&1; then
            echo "=== Deployment already exists. Updating image only ==="
            sudo kubectl set image deployment/${{ env.DEPLOY_NAME }} \
              ${{ env.CONTAINER_NAME }}="$IMAGE_NAME" \
              -n ${{ env.NAMESPACE }}
          else
            echo "=== First-time deployment. Creating Deployment and Service ==="
            envsubst <<'EOF' | sudo kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ env.DEPLOY_NAME }}
            template:
              metadata:
                labels:
                  app: ${{ env.DEPLOY_NAME }}
              spec:
                containers:
                  - name: ${{ env.CONTAINER_NAME }}
                    image: ${IMAGE_NAME}
                    ports:
                      - containerPort: 8000
                    envFrom:
                      - secretRef:
                          name: app-env    # Populated from APP_ENV_FILE_GCP secret + infra IPs
                    resources:
                      requests:
                        memory: "512Mi"
                        cpu: "250m"
                      limits:
                        memory: "2Gi"
                        cpu: "1000m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ env.DEPLOY_NAME }}
            namespace: ${{ env.NAMESPACE }}
            annotations:
              # Restricts the LB to internal VPC traffic only.
              # Remove this annotation for public internet access.
              cloud.google.com/load-balancer-type: "Internal"
          spec:
            selector:
              app: ${{ env.DEPLOY_NAME }}
            ports:
              - protocol: TCP
                port: 8000
                targetPort: 8000
            type: LoadBalancer
          EOF
          fi

      # ── 8. Wait and Check Deployment ─────────────────────────
      # Waits up to 5 minutes for the rollout to succeed,
      # then prints deployment / pod / service status.
      - name: Wait and Check Deployment
        run: |
          echo "INFO: Waiting for deployment rollout ..."
          sudo kubectl rollout status deployment/${{ env.DEPLOY_NAME }} \
            -n ${{ env.NAMESPACE }} --timeout=5m

          echo "=== Deployment Status ==="
          sudo kubectl get deployment -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Pod Status ==="
          sudo kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}

          echo "=== Service Status ==="
          sudo kubectl get svc -n ${{ env.NAMESPACE }} ${{ env.DEPLOY_NAME }}

      # ── 9. Verify Application ─────────────────────────────────
      # Prints pod list and the last 200 log lines.
      - name: Verify Application
        run: |
          echo "INFO: Verifying application ..."
          sudo kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }}
          sudo kubectl logs -n ${{ env.NAMESPACE }} -l app=${{ env.DEPLOY_NAME }} --tail=200 \
            || echo "No logs available yet."

      # ── 10. Verify Service and DNS ────────────────────────────
      # Fetches all resources and the external IP of the LoadBalancer.
      # GKE internal LBs provide an IP (not a DNS hostname).
      # DNS resolution is attempted gracefully if a hostname is found.
      - name: Verify Kubernetes Service and DNS Resolution
        run: |
          echo "INFO: Fetching all resources in namespace ${{ env.NAMESPACE }} ..."
          sudo kubectl get all -n ${{ env.NAMESPACE }}

          SERVICE_NAME=${{ env.DEPLOY_NAME }}

          EXTERNAL_IP=$(sudo kubectl get svc "$SERVICE_NAME" -n ${{ env.NAMESPACE }} \
                          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          echo "External IP : ${EXTERNAL_IP:-<not yet assigned>}"

          SERVICE_DNS=$(sudo kubectl get svc "$SERVICE_NAME" -n ${{ env.NAMESPACE }} \
                          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          echo "Service DNS : ${SERVICE_DNS:-<not available — GKE internal LBs use IP only>}"

          if [ -n "$SERVICE_DNS" ]; then
            echo "INFO: Running nslookup on $SERVICE_DNS ..."
            nslookup "$SERVICE_DNS" || echo "WARNING: nslookup failed — DNS may not have propagated yet."
          fi

          echo "Verification complete."

      # ── 11. Get App Endpoint ──────────────────────────────────
      # Polls until the app LoadBalancer IP is assigned.
      # GKE exposes an IP for internal LoadBalancers, not a hostname.
      - name: Get App Service Endpoint
        id: app_ip
        run: |
          echo "=== Waiting for App LoadBalancer IP ==="
          APP_IP=""
          for i in $(seq 1 36); do
            APP_IP=$(sudo kubectl get svc ${{ env.DEPLOY_NAME }} -n ${{ env.NAMESPACE }} \
                      -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$APP_IP" ]; then
              break
            fi
            echo "  Attempt $i/36 — retrying in 10s..."
            sleep 10
          done
          echo "APP_SERVICE_IP=$APP_IP" >> "$GITHUB_OUTPUT"

      # ── 12. Final Summary ─────────────────────────────────────
      - name: Final Deployment Summary
        run: |
          echo "======================================================"
          echo "              FULL DEPLOYMENT SUMMARY"
          echo "======================================================"
          echo "  [Infrastructure]"
          echo "  Elasticsearch           : ${{ needs.deployInfra.outputs.ELASTICSEARCH_IP }}:9200"
          echo "  OpenTelemetry Collector : ${{ needs.deployInfra.outputs.OTEL_COLLECTOR_IP }}:4318/4319/4320"
          echo "  Phoenix (Arize)         : ${{ needs.deployInfra.outputs.PHOENIX_IP }}:6006"
          echo "  Grafana                 : ${{ needs.deployInfra.outputs.GRAFANA_IP }}:3000"
          echo "  Redis                   : ${{ needs.deployInfra.outputs.REDIS_IP }}:6379"
          echo ""
          echo "  [Application]"
          echo "  Deployment : ${{ env.DEPLOY_NAME }}"
          echo "  Namespace  : ${{ env.NAMESPACE }}"
          echo "  Image      : ${{ env.ARTIFACT_REGISTRY }}/${{ env.SHORT_NAME }}:${{ github.sha }}"
          echo "  Endpoint   : http://${{ steps.app_ip.outputs.APP_SERVICE_IP }}:8000"
          echo "======================================================"

      # ── 13. Debug on Failure ──────────────────────────────────
      # Only runs when a previous step fails.
      # Prints pod descriptions, events, current logs, and
      # previous container logs to help diagnose the issue.
      - name: Debug Deployment Failure
        if: failure()
        run: |
          echo "=== DEBUGGING DEPLOYMENT FAILURE ==="

          echo "=== All Pods in Namespace ==="
          sudo kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          echo "=== Recent Events ==="
          sudo kubectl get events -n ${{ env.NAMESPACE }} \
            --sort-by='.lastTimestamp' | tail -n 30

          POD_NAME=$(sudo kubectl get pods -n ${{ env.NAMESPACE }} \
                      -l app=${{ env.DEPLOY_NAME }} \
                      -o jsonpath="{.items[0].metadata.name}")

          if [ -n "$POD_NAME" ]; then
            echo "=== Pod Description ==="
            sudo kubectl describe pod "$POD_NAME" -n ${{ env.NAMESPACE }}

            echo "=== Current Container Logs ==="
            sudo kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --tail=100 \
              || echo "No current logs available."

            echo "=== Previous Container Logs (if pod restarted) ==="
            sudo kubectl logs "$POD_NAME" -n ${{ env.NAMESPACE }} --previous --tail=100 \
              || echo "No previous logs available."
          else
            echo "No pod found with label app=${{ env.DEPLOY_NAME }}"
          fi