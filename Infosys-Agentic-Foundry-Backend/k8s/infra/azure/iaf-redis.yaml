# ==============================================================
#  Redis — Azure (AKS) — Deployment Template
#
#  PURPOSE:
#  Deploys Redis to AKS for caching. The authentication
#  password is read from the Kubernetes Secret 'infra-secrets'
#  (key: redis-password) — no credentials are stored here.
#
#  HOW TO USE:
#  1. Replace every <PLACEHOLDER> below with your actual value.
#  2. Create the infra-secrets Secret first (if not already done):
#
#     kubectl apply -f k8s/infra/infra-secrets-template.yaml
#
#  3. Apply this manifest:
#
#     kubectl apply -f k8s/infra/azure/iaf-redis.yaml
#
#  PLACEHOLDERS:
#  <YOUR_NAMESPACE>    Kubernetes namespace (must match the
#                      namespace where infra-secrets was created)
#  <REDIS_IMAGE>       Full image reference, e.g.:
#                        - Public:   redis:7.2-alpine
#                        - Internal: <your-registry>/redis:<tag>
#  <REDIS_SVC_DNS>     In-cluster DNS name for the Redis Service.
#                      Format: redis.<YOUR_NAMESPACE>.svc.cluster.local
#                      Example: redis.iafv4.svc.cluster.local
# ==============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: <YOUR_NAMESPACE>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: <YOUR_NAMESPACE>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: <REDIS_IMAGE>
        args: ["--requirepass", "$(REDIS_PASSWORD)"]
        ports:
        - containerPort: 6379
        env:
        - name: REDIS_HOST
          value: "<REDIS_SVC_DNS>"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_DB
          value: "0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: redis-password
        - name: CACHE_EXPIRY_TIME
          value: "900"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: <YOUR_NAMESPACE>
  annotations:
    service.beta.kubernetes.io/<load-balancer>: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
